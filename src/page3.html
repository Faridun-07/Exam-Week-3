<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="./output.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jost:ital,wght@0,100..900;1,100..900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<body class="bg-[#030303] text-[white]">
   <header class="max-w-300 m-auto flex justify-between items-center p-[20px_20px] lg:p-[20px_0] lg:pb-[50px]">
    <img src="./images/Logo.png" alt="">
    <nav class="flex gap-[30px] hidden lg:flex">
        <p class="text-[white]">Home</p>
        <p class="text-[white]">Services</p>
        <p class="text-[white]">Careers</p>
        <p class="text-[white]">Career Details</p>
        <p class="text-[white]">Contact</p>
    </nav>
    <button class="text-[14px] bg-[#0A84FF] text-[white] rounded-[10px] p-[8px_20px]">Contact Us</button>
 </header>
 <main>
    <section class="max-w-300 m-auto flex flex-col gap-[30px] lg:flex-row lg:justify-between lg:items-center  bg-[#141414] pl-[50px] rounded-[20px] lg:px-[70px]">
         <aside class="flex flex-col gap-[30px] items-start">
            <h1 class="font-bold lg:text-[30px] text-[30px]">Build the Future with Us</h1>
            <p class="text-[#E5E5E5] lg:w-[550px]">We’re a team of builders, thinkers, and explorers using AI, machine learning, and blockchain to solve meaningful problems.</p>
            <button class="bg-[#0A84FF] text-[13px] rounded-[5px] p-[8px_15px]">Explore Open Positions</button>
        </aside>
        <img src="./images/bag.png" alt="">
    </section>
    <section class="bg-[#0B0B0B] lg:mt-[80px] mt-[50px] lg:p-[40px_0] p-[40px_20px]">
        <div class="max-w-300 m-auto flex flex-col gap-[20px] lg:flex-row lg:justify-between">
            <div class="flex gap-[70px] items-center bg-[#191919] p-[10px_15px] rounded-[30px]">
                <p class="text-[#D1D1D1]">Departments</p>
                <i class="fa-solid fa-caret-down" style="color:white;"></i>
            </div>
              <div class="flex gap-[70px] items-center bg-[#191919] p-[10px_15px] rounded-[30px]">
                <p class="text-[#D1D1D1]">Experience</p>
                <i class="fa-solid fa-caret-down" style="color:white;"></i>
            </div>
              <div class="flex gap-[70px] items-center bg-[#191919] p-[10px_15px] rounded-[30px]">
                <p class="text-[#D1D1D1]">Job Type</p>
                <i class="fa-solid fa-caret-down" style="color:white;"></i>
            </div>
              <div class="flex gap-[50px] items-center bg-[#191919] p-[10px_15px] rounded-[30px]">
                <p class="text-[#D1D1D1]">Workplace Type</p>
                <i class="fa-solid fa-caret-down" style="color:white;"></i>
            </div>
              <div class="flex gap-[70px] items-center bg-[#191919] p-[10px_15px] rounded-[30px]">
                <p class="text-[#5E5E5E] font-medium">Search by keywords...</p>
                <p class="bg-[#459CF3] p-[2px_5px] rounded-full"><i class="fa-solid fa-magnifying-glass" style="color:white;"></i></p>
            </div>
        </div>
    </section>
 </main> 
</body>
</html>
